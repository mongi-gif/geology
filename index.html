    <!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projet Géoparc du Kef</title>

<meta name="description" content="Projet Géoparc du Kef - UNESCO Global Geopark">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet" href="style.css">

</head>

<body>
<!-- ================= Bouton ================= -->
<a href="https://sites.google.com/view/projet-geoparc-kef"
   target="_blank"
   class="open-map-btn">
   🗺️ Ouvrir la carte interactive
</a>
<!-- ================= CARTE ================= -->

<div id="map"></div>

<!-- ================= MENU HAMBURGER ================= -->

<button id="menuButton">☰</button>

<!-- ================= PANNEAU LATERAL ================= -->

<div id="sidebar">

    <div class="sidebar-header">

        <h2>Filtres</h2>

        <button id="closeSidebar">✕</button>

    </div>

    <div class="filter">

        <label>
            <input type="checkbox" id="geo" checked>
            🔴 Géologie
        </label>

        <label>
            <input type="checkbox" id="mine" checked>
            🔵 Patrimoine minier
        </label>

        <label>
            <input type="checkbox" id="hist" checked>
            🟠 Historique
        </label>

        <label>
            <input type="checkbox" id="nature" checked>
            🟢 Naturel
        </label>

        <label>
            <input type="checkbox" id="ethno" checked>
            🟤 Ethnographie
        </label>

        <label>
            <input type="checkbox" id="gastro" checked>
            🔷 Gastronomie
        </label>

    </div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>

</html>
</body>
</html>
