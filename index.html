// ===== AFFICHAGE =====
sites.forEach(function(site) {

 var imagesHTML = "";

if (site.images) {
  site.images.forEach(function(img) {
    imagesHTML += 
      "<div style='text-align:center;margin:5px;display:inline-block;'>" +
        "<img src='" + img.url + "' width='250px' style='border-radius:6px; margin-left:20px'><br>" +
        "<small>" + img.titre + "</small>" +
      "</div>";
  });
}
  var couleur = getColor(site.type);

  L.circleMarker([site.lat, site.lng], {
    radius: 12,
    fillColor: couleur,
    color: "red",
    weight: 1,
    opacity: 1,
    fillOpacity: 0.9
  }).addTo(map)

  .bindTooltip(site.nom, {
    permanent: false,
    direction: "right",
    offset: [20, 0],   // 👈 décalage horizontal
    className: "label"
})

.bindPopup(
  "<b>" + site.nom + "</b><br>" +
  imagesHTML + "<br>" +
  "<b>Description :</b> " + site.desc
);

});


// 🧭 LÉGENDE
var legend = L.control({position: "bottomright"});
